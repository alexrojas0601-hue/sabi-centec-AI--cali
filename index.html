<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SABI AI CENTEC CALI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
color:#1e293b;
}
header{
background:#082b63;
color:white;
padding:10px 15px;
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}
.logo{
display:flex;
align-items:center;
gap:10px;
}
.logo img{
width:55px;
height:55px;
border-radius:50%;
background:white;
object-fit:cover;
}
h1{
margin:0;
font-size:1.7rem;
}
.frase{
font-weight:bold;
border-left:4px solid orange;
padding-left:10px;
max-width:420px;
}
.chat{
max-width:1100px;
margin:10px auto;
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 16px rgba(0,0,0,.08);
}
#messages{
height:65vh;
overflow-y:auto;
padding:15px;
}
.msg{
padding:14px;
border-radius:14px;
margin-bottom:12px;
white-space:pre-wrap;
line-height:1.6;
}
.user{
background:#e8f1ff;
margin-left:12%;
}
.sabi{
background:#fff7e8;
border:1px solid #ffd18f;
position:relative;
padding-left:55px;
}
.mini{
position:absolute;
left:12px;
top:12px;
width:30px;
height:30px;
border-radius:50%;
overflow:hidden;
background:white;
}
.mini img{
width:100%;
height:100%;
object-fit:cover;
}
.input{
padding:14px;
border-top:1px solid #ddd;
}
textarea{
width:100%;
min-height:90px;
padding:14px;
font-size:1rem;
border-radius:12px;
border:1px solid #cbd5e1;
resize:vertical;
}
.actions{
display:grid;
grid-template-columns:1fr 180px;
gap:10px;
margin-top:10px;
}
button{
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:1rem;
}
.send{
background:#082b63;
color:white;
}
.new{
background:#e2e8f0;
}
@media(max-width:780px){
.actions{grid-template-columns:1fr;}
.user{margin-left:0;}
header{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<header>
<div class="logo">
<img src="assets/avatar.png">
<div>
<h1>SABI AI CENTEC CALI</h1>
<div>Saber • Aprender • Brillar • Imaginar</div>
</div>
</div>

<div class="frase">
“El error no nos detiene. Nos enseña, nos fortalece y nos hace crecer.”
</div>
</header>

<div class="chat">

<div id="messages"></div>

<div class="input">
<textarea id="q" placeholder="Escribe tu pregunta..."></textarea>

<div class="actions">
<button class="send" onclick="preguntar()">Consultar a SABI</button>
<button class="new" onclick="nuevo()">Nueva conversación</button>
</div>
</div>

</div>

<script>
const q=document.getElementById("q");
const messages=document.getElementById("messages");

function add(tipo,texto){
const d=document.createElement("div");
d.className="msg "+tipo;

if(tipo==="sabi"){
d.innerHTML='<div class="mini"><img src="assets/avatar.png"></div><div>'+texto+'</div>';
}else{
d.textContent=texto;
}

messages.appendChild(d);
messages.scrollTop=messages.scrollHeight;
}

function respuesta(p){

const t=p.toLowerCase();

if(t.includes("teoria idealista")){
return `
PREGUNTA:
¿Qué es la teoría idealista?

RESPUESTA:
La teoría idealista es una corriente filosófica que afirma que las ideas y el pensamiento son fundamentales para comprender la realidad.

EXPLICACIÓN:
El idealismo considera que la mente y las ideas influyen en cómo entendemos el mundo.

AUTORES IMPORTANTES:
• Platón
• Kant
• Hegel

EJEMPLO:
Dos personas pueden vivir la misma situación y pensar diferente según sus ideas.

VIDA COTIDIANA:
Antes de construir algo, primero nace la idea en la mente.

VERIFICACIÓN:
• Explica con tus palabras qué entendiste.
• ¿Dónde ves el idealismo en la vida diaria?
`;
}

if(t.includes("capital de roma")){
return `
PREGUNTA:
¿Cuál es la capital de Roma?

RESPUESTA:
La pregunta está incorrecta.

CORRECCIÓN:
Roma ya es una ciudad capital.

FORMA CORRECTA:
¿Cuál es la capital de Italia?

RESPUESTA CORRECTA:
La capital de Italia es Roma.

VERIFICACIÓN:
• Escribe ahora cuál es la capital de Colombia.
`;
}

if(t.includes("capital de italia")){
return `
PREGUNTA:
¿Cuál es la capital de Italia?

RESPUESTA:
La capital de Italia es Roma.

EXPLICACIÓN:
Italia es el país.
Roma es la ciudad capital.

VERIFICACIÓN:
• Escribe otra oración parecida usando Colombia.
`;
}

return `
PREGUNTA:
${p}

RESPUESTA:
Voy a ayudarte a comprender este tema paso a paso.

EXPLICACIÓN:
Aprender no es memorizar.
Aprender es entender:
• qué es,
• para qué sirve,
• cómo funciona,
• y dónde se aplica.

EJEMPLO:
Todo concepto debe relacionarse con situaciones reales para comprenderse mejor.

VIDA COTIDIANA:
Piensa dónde has visto este tema en tu casa, colegio o trabajo.

VERIFICACIÓN:
• Explica con tus palabras lo que entendiste.
• Da un ejemplo diferente.
• ¿Para qué sirve esto en la vida real?
`;
}

function preguntar(){
const texto=q.value.trim();

if(!texto)return;

add("user",texto);

setTimeout(()=>{
add("sabi",respuesta(texto));
},250);

q.value="";
q.focus();
}

function nuevo(){
messages.innerHTML="";
q.focus();
}

q.addEventListener("keydown",e=>{
if(e.key==="Enter" && (e.ctrlKey || e.metaKey)){
preguntar();
}
});
</script>

</body>
</html>
