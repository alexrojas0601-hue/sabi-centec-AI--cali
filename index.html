<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SABI AI CENTEC CALI</title>
<style>
:root{
  --azul:#082b63;--azul2:#0f4c81;--naranja:#f28c28;--amarillo:#ffd166;
  --fondo:#f4f7fb;--texto:#102033;--borde:#d8e2ee;--usuario:#e8f1ff;--sabi:#fff8ee;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
header{
  background:var(--azul);color:white;height:72px;display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:8px 16px;position:sticky;top:0;z-index:20;box-shadow:0 4px 14px rgba(0,0,0,.12)
}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:white;border:2px solid white}
h1{font-size:1.7rem;line-height:1.05;font-weight:900}
.sub{color:var(--amarillo);font-size:.86rem;font-weight:800;margin-top:2px}
.frase{max-width:470px;background:rgba(255,255,255,.12);border-left:4px solid var(--naranja);padding:8px 12px;border-radius:12px;font-size:.9rem;font-weight:800;line-height:1.25}
.app{max-width:980px;margin:0 auto;padding:14px 12px 20px}
.askbox{background:white;border:1px solid var(--borde);border-radius:18px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.06);margin-bottom:12px}
.ask-title{font-size:1.08rem;font-weight:900;color:var(--azul);margin-bottom:8px}
textarea{width:100%;min-height:92px;border:1px solid #b9c9dc;border-radius:14px;padding:14px;font-family:inherit;font-size:1rem;line-height:1.45;resize:vertical;outline:none}
textarea:focus{border-color:var(--azul2);box-shadow:0 0 0 3px rgba(15,76,129,.12)}
.actions{display:grid;grid-template-columns:1fr 170px;gap:10px;margin-top:10px}
button{border:0;border-radius:14px;padding:13px;font-weight:900;font-size:1rem;cursor:pointer}
.send{color:white;background:linear-gradient(135deg,var(--azul2),var(--azul))}
.new{color:var(--azul);background:#e8eef6}
.chat{background:white;border:1px solid var(--borde);border-radius:18px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06)}
.chat-head{padding:10px 14px;font-weight:900;color:var(--azul);border-bottom:1px solid var(--borde);background:#f8fbff}
#messages{min-height:330px;max-height:58vh;overflow-y:auto;padding:14px}
.msg{padding:14px 16px;border-radius:16px;margin-bottom:12px;line-height:1.55;white-space:pre-wrap;font-size:1rem}
.user{background:var(--usuario);border:1px solid #bdd7ff;margin-left:12%}
.sabi{background:var(--sabi);border:1px solid #ffd18f;position:relative;padding-left:58px}
.mini{position:absolute;left:14px;top:14px;width:32px;height:32px;border-radius:50%;overflow:hidden;background:white;box-shadow:0 3px 8px rgba(0,0,0,.16)}
.mini img{width:100%;height:100%;object-fit:cover}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#edf5ff;color:var(--azul);border:1px solid #c9def7;padding:8px 10px;border-radius:999px;font-size:.88rem;font-weight:800}
@media(max-width:760px){header{height:auto;align-items:flex-start;flex-direction:column}h1{font-size:1.35rem}.frase{max-width:100%}.actions{grid-template-columns:1fr}.user{margin-left:0}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="assets/avatar.png" alt="SABI">
    <div><h1>SABI AI CENTEC CALI</h1><div class="sub">Saber • Aprender • Brillar • Imaginar</div></div>
  </div>
  <div class="frase">“El error no nos detiene. Nos enseña, nos fortalece y nos hace crecer.”</div>
</header>

<main class="app">
  <section class="askbox">
    <div class="ask-title">Pregunta a SABI</div>
    <textarea id="question" placeholder="Escribe tu pregunta aquí. Ejemplo: ¿Qué es la teoría idealista?"></textarea>
    <div class="actions">
      <button class="send" onclick="ask()">Preguntar</button>
      <button class="new" onclick="resetChat()">Nueva conversación</button>
    </div>
    <div class="chips">
      <button class="chip" onclick="example('¿Qué es la teoría idealista?')">Teoría idealista</button>
      <button class="chip" onclick="example('¿Cuál es la capital de Italia?')">Capital de Italia</button>
      <button class="chip" onclick="example('Explícame las fracciones')">Fracciones</button>
    </div>
  </section>

  <section class="chat">
    <div class="chat-head">Respuesta de SABI</div>
    <div id="messages"></div>
  </section>
</main>

<script>
const q=document.getElementById("question");
const messages=document.getElementById("messages");

function normalizeText(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[¿?.,;:!]/g," ").replace(/\s+/g," ").trim();
}
function mini(){return '<div class="mini"><img src="assets/avatar.png" alt="SABI"></div>'}
function add(type,text){
  const d=document.createElement("div");
  d.className="msg "+type;
  if(type==="sabi"){d.innerHTML=mini()+"<div>"+text+"</div>"}else{d.textContent=text}
  messages.appendChild(d);messages.scrollTop=messages.scrollHeight;
}
function example(text){q.value=text;q.focus()}

function response(input){
  const t=normalizeText(input);

  if(t.includes("capital de roma")){
    return `PREGUNTA:
¿Cuál es la capital de Roma?

RESPUESTA DIRECTA:
La pregunta está mal formulada, porque Roma no es un país. Roma es una ciudad.

La forma correcta sería:
¿Cuál es la capital de Italia?

Respuesta correcta:
La capital de Italia es Roma.

EXPLICACIÓN PEDAGÓGICA:
Un país puede tener una ciudad capital. Italia es el país. Roma es la ciudad capital.

EJEMPLO:
Colombia es el país y Bogotá es su capital.

APLICACIÓN EN LA VIDA COTIDIANA:
Esto sirve para ubicarnos mejor en geografía, noticias, mapas, viajes y cultura general.

VERIFICACIÓN:
• Escribe con tus palabras cuál fue el error de la pregunta.
• Da otro ejemplo de país y capital.`;
  }

  if(t.includes("capital de italia")){
    return `PREGUNTA:
¿Cuál es la capital de Italia?

RESPUESTA DIRECTA:
La capital de Italia es Roma.

EXPLICACIÓN PEDAGÓGICA:
Italia es un país europeo. Roma es su ciudad capital.

EJEMPLO:
Colombia es país y Bogotá es capital.
Italia es país y Roma es capital.

APLICACIÓN EN LA VIDA COTIDIANA:
Sirve para entender noticias internacionales, mapas, historia, cultura y turismo.

VERIFICACIÓN:
• Escríbelo con tus palabras.
• Da un ejemplo parecido con otro país.`;
  }

  if(t.includes("teoria idealista") || t.includes("idealismo")){
    return `PREGUNTA:
¿Qué es la teoría idealista?

RESPUESTA DIRECTA:
La teoría idealista es una corriente filosófica que sostiene que las ideas, la mente o la conciencia son fundamentales para comprender la realidad.

EXPLICACIÓN PEDAGÓGICA:
El idealismo enseña que no entendemos el mundo solo por lo que tocamos o vemos, sino también por las ideas que tenemos en la mente.

Dicho de forma sencilla:
primero pensamos, interpretamos y damos sentido; después actuamos sobre la realidad.

EJEMPLO COTIDIANO:
Dos estudiantes pueden recibir la misma nota baja.
Uno piensa: “soy malo para estudiar”.
Otro piensa: “debo cambiar mi método”.
La situación material es la misma, pero la idea cambia la forma de actuar.

AUTORES RELACIONADOS:
• Platón
• Kant
• Hegel

APLICACIÓN EN LA VIDA COTIDIANA:
Sirve para entender que nuestras ideas influyen en decisiones, emociones, metas y forma de transformar la vida.

ERROR COMÚN:
Creer que idealismo significa “soñar bonito”. No es eso. Es una teoría filosófica sobre el papel de las ideas en la realidad.

VERIFICACIÓN:
• Explica con tus palabras qué entendiste por teoría idealista.
• Da un ejemplo de una idea que pueda cambiar la vida de una persona.
• ¿Para qué puede servir este concepto en tu vida diaria?`;
  }

  if(t.includes("fraccion") || t.includes("fracciones")){
    return `PREGUNTA:
${input}

RESPUESTA DIRECTA:
Una fracción representa una parte de un todo.

EXPLICACIÓN PEDAGÓGICA:
Una fracción tiene dos partes:
• Numerador: indica cuántas partes tomamos.
• Denominador: indica en cuántas partes iguales se dividió el todo.

EJEMPLO:
Si una pizza se divide en 4 partes iguales y comes 1, comiste 1/4.

APLICACIÓN EN LA VIDA COTIDIANA:
Las fracciones sirven para cocinar, repartir dinero, medir terrenos, dividir alimentos y entender descuentos.

ERROR COMÚN:
Pensar que el número de abajo se ignora. No. El denominador indica el tamaño de las partes.

VERIFICACIÓN:
• Explica con tus palabras qué es una fracción.
• Da un ejemplo usando una pizza, una torta o dinero.
• ¿Dónde usarías fracciones en tu vida diaria?`;
  }

  return `PREGUNTA:
${input}

RESPUESTA DIRECTA:
Voy a responder tu pregunta de forma clara y organizada para que puedas comprenderla, no solo leerla.

EXPLICACIÓN PEDAGÓGICA:
Para aprender bien este tema debemos identificar:
• qué significa,
• para qué sirve,
• cómo se aplica,
• qué errores se deben evitar.

EJEMPLO:
Todo conocimiento se entiende mejor cuando lo conectamos con una situación real de la vida cotidiana.

APLICACIÓN EN LA VIDA COTIDIANA:
Este tema puede ayudarte a tomar mejores decisiones, resolver problemas, explicar ideas y comprender mejor tu entorno.

VERIFICACIÓN:
• Escribe con tus palabras qué entendiste.
• Da un ejemplo propio.
• Explica para qué sirve esto en la vida diaria.`;
}

function ask(){
  const text=q.value.trim();
  if(!text){q.focus();return}
  add("user",text);
  setTimeout(()=>add("sabi",response(text)),180);
  q.value="";q.focus();
}
function resetChat(){messages.innerHTML="";q.focus()}
q.addEventListener("keydown",e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))ask()});
q.focus();
</script>
</body>
</html>
