<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SABI AI CENTEC CALI</title>
<style>
:root{
--azul:#082b63;
--naranja:#f28c28;
--gris:#eef2f7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f7fb;
color:#1e293b;
}
header{
background:var(--azul);
color:white;
padding:10px 16px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
position:sticky;
top:0;
z-index:10;
}
.logo{
display:flex;
align-items:center;
gap:12px;
}
.avatar{
width:56px;
height:56px;
border-radius:50%;
overflow:hidden;
background:white;
flex-shrink:0;
}
.avatar img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}
h1{
font-size:2rem;
font-weight:900;
}
.sub{
color:#ffd166;
font-size:.9rem;
font-weight:700;
}
.frase{
border-left:4px solid var(--naranja);
padding-left:10px;
font-weight:700;
max-width:450px;
}
main{
max-width:1100px;
margin:12px auto;
padding:0 12px 20px;
}
.chat{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 4px 18px rgba(0,0,0,.08);
border:1px solid #dbe3ef;
}
.top{
padding:12px 16px;
background:#f7f9fc;
border-bottom:1px solid #dbe3ef;
font-weight:800;
color:var(--azul);
}
#messages{
height:58vh;
overflow-y:auto;
padding:16px;
background:white;
}
.message{
padding:14px;
border-radius:14px;
margin-bottom:12px;
line-height:1.6;
white-space:pre-wrap;
font-size:1rem;
}
.user{
background:#e8f1ff;
margin-left:12%;
}
.sabi{
background:#fff7eb;
border:1px solid #ffd18f;
position:relative;
padding-left:54px;
}
.mini{
position:absolute;
left:12px;
top:12px;
width:30px;
height:30px;
border-radius:50%;
overflow:hidden;
background:white;
}
.mini img{
width:100%;
height:100%;
object-fit:cover;
}
.input{
padding:14px;
border-top:1px solid #dbe3ef;
background:white;
}
textarea{
width:100%;
min-height:95px;
border-radius:14px;
border:1px solid #cbd5e1;
padding:14px;
font-size:1rem;
font-family:inherit;
resize:vertical;
outline:none;
}
textarea:focus{
border-color:var(--azul);
}
.actions{
display:grid;
grid-template-columns:1fr 180px;
gap:10px;
margin-top:10px;
}
button{
border:none;
border-radius:14px;
padding:14px;
cursor:pointer;
font-weight:900;
font-size:1rem;
}
.send{
background:var(--azul);
color:white;
}
.new{
background:#e2e8f0;
color:#1e293b;
}
@media(max-width:780px){
header{
flex-direction:column;
align-items:flex-start;
}
.actions{
grid-template-columns:1fr;
}
.user{
margin-left:0;
}
.frase{
max-width:100%;
}
}
</style>
</head>
<body>

<header>
<div class="logo">
<div class="avatar">
<img src="assets/avatar-sabi.png" alt="SABI">
</div>
<div>
<h1>SABI AI CENTEC CALI</h1>
<div class="sub">Saber • Aprender • Brillar • Imaginar</div>
</div>
</div>

<div class="frase">
“El error no nos detiene. Nos enseña, nos fortalece y nos hace crecer.”
</div>
</header>

<main>
<div class="chat">

<div class="top">
Tutor pedagógico inteligente
</div>

<div id="messages"></div>

<div class="input">
<textarea id="pregunta" placeholder="Escribe aquí tu pregunta..."></textarea>

<div class="actions">
<button class="send" onclick="consultar()">Consultar a SABI</button>
<button class="new" onclick="nuevo()">Nueva conversación</button>
</div>
</div>

</div>
</main>

<script>
const messages = document.getElementById("messages");
const pregunta = document.getElementById("pregunta");

function mini(){
return `
<div class="mini">
<img src="assets/avatar-sabi.png">
</div>
`;
}

function agregar(tipo,texto){
const div=document.createElement("div");
div.className="message "+tipo;

if(tipo==="sabi"){
div.innerHTML=mini()+"<div>"+texto+"</div>";
}else{
div.textContent=texto;
}

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
}

function responder(q){

const p=q.toLowerCase();

if(p.includes("teoria idealista")){
return `
PREGUNTA:
¿Qué es la teoría idealista?

RESPUESTA CLARA:
La teoría idealista es una corriente filosófica que afirma que las ideas, la mente o el pensamiento son más importantes que lo material.

En otras palabras:
el idealismo considera que la realidad no depende únicamente de las cosas físicas, sino también de la conciencia, las ideas y la manera como pensamos el mundo.

EJEMPLO SENCILLO:
Si dos personas observan el mismo problema, cada una puede interpretarlo diferente según sus ideas y pensamientos.
Para el idealismo, la mente influye profundamente en la realidad.

AUTORES IMPORTANTES:
• Platón
• Kant
• Hegel

IDEA CENTRAL:
Primero está la idea o pensamiento; luego viene la acción o realidad material.

PREGUNTA DE REFLEXIÓN:
¿Crees que las ideas pueden cambiar una sociedad antes que el dinero o la fuerza?
`;
}

if(p.includes("capital de roma")){
return `
PREGUNTA:
¿Cuál es la capital de Roma?

CORRECCIÓN:
La pregunta está incorrecta.

Roma ya es una ciudad capital.

FORMA CORRECTA:
¿Cuál es la capital de Italia?

RESPUESTA:
La capital de Italia es Roma.
`;
}

if(p.includes("capital de italia")){
return `
PREGUNTA:
¿Cuál es la capital de Italia?

RESPUESTA:
La capital de Italia es Roma.

EXPLICACIÓN:
Italia es el país.
Roma es su ciudad capital.
`;
}

return `
PREGUNTA:
${q}

RESPUESTA PEDAGÓGICA:

Voy a explicarlo de forma clara, organizada y fácil de comprender.

1. DEFINICIÓN
Primero debemos entender qué significa el concepto.

2. EXPLICACIÓN
Un buen aprendizaje ocurre cuando comprendemos:
• qué es,
• para qué sirve,
• cómo funciona,
• y dónde se aplica.

3. EJEMPLO
Todo concepto debe conectarse con ejemplos reales para evitar confusión.

4. REFLEXIÓN
Aprender no es repetir; aprender es comprender.

Ahora dime:
¿qué parte específica no entiendes o deseas profundizar?
`;
}

function consultar(){
const q=pregunta.value.trim();

if(!q){
pregunta.focus();
return;
}

agregar("user",q);

setTimeout(()=>{
agregar("sabi",responder(q));
},300);

pregunta.value="";
pregunta.focus();
}

function nuevo(){
messages.innerHTML="";
pregunta.focus();
}

pregunta.addEventListener("keydown",function(e){
if(e.key==="Enter" && (e.ctrlKey || e.metaKey)){
consultar();
}
});
</script>

</body>
</html>
